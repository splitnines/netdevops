name: NetDevOps CI/CD

on:
  push:
    branches-ignore:
      - main
    paths:
      - "playbooks/**"
      - "test/**"
  workflow_dispatch:

jobs:
  Validate:
    runs-on: self-hosted
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Sync dependencies with uv
        run: |
          uv python install 3.14
          uv sync --python 3.14

      - name: Ansible Syntax Check
        run: |
          find playbooks -type f \( -name '*.yml' -o -name '*.yaml' \) \
            -exec uv run ansible-playbook --syntax-check -i inventory/inventory.yml {} \;

  Backup:
    runs-on: self-hosted
    env:
      CISCO_USER: ${{ secrets.CISCO_USER }}
      CISCO_PASS: ${{ secrets.CISCO_PASS }}
    needs: Validate

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6

      - name: Check for backup playbook
        id: backup-check
        shell: bash
        run: |
          if [[ -f playbooks/config_backup.yml ]]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Sync Dependencies With uv
        if: steps.backup-check.outputs.exists == 'true'
        run: uv sync

      - name: Backup Configs
        if: steps.backup-check.outputs.exists == 'true'
        run: |
          uv run ansible-playbook \
            -i inventory/lab.yml \
            playbooks/config_backup.yml

      - name: Copy Backups
        if: steps.backup-check.outputs.exists == 'true'
        run: |
          cp -v backups/* ~/projects/netdevops/backups/

  Deploy:
    runs-on: self-hosted
    env:
      CISCO_USER: ${{ secrets.CISCO_USER }}
      CISCO_PASS: ${{ secrets.CISCO_PASS }}
    needs: Backup
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6

      - name: Sync Dependencies With uv
        run: |
          uv sync

      - name: Deploy Changes
        run: |
          set -euo pipefail

          while IFS= read -r -d '' playbook; do
            echo "Running: $playbook"
            uv run ansible-playbook -i inventory/inventory.yml "$playbook"
          done < <(
            find playbooks -maxdepth 1 -type f \
              \( -name '*.yml' -o -name '*.yaml' \) \
              ! -name '*config_backup.yml' \
              -print0 | sort -z
          )

  Tests:
    runs-on: self-hosted
    env:
      CISCO_USER: ${{ secrets.CISCO_USER }}
      CISCO_PASS: ${{ secrets.CISCO_PASS }}
    needs: Deploy

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6

      - name: Check for Python tests
        id: python-tests
        shell: bash
        run: |
          if [[ -d tests ]] &&
             [[ -n "$(find tests -type f -name '*.py' -print -quit)" ]]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Sync Dependencies With uv
        if: steps.python-tests.outputs.exists == 'true'
        run: uv sync

      - name: Export env vars for pyATS
        if: steps.python-tests.outputs.exists == 'true'
        run: |
          echo "CISCO_USER=${CISCO_USER}" >> "$GITHUB_ENV"
          echo "CISCO_PASS=${CISCO_PASS}" >> "$GITHUB_ENV"

      - name: Run pyATS Tests
        if: steps.python-tests.outputs.exists == 'true'
        run: |
          uv run pyats run job tests/job.py --no-mail --no-archive
