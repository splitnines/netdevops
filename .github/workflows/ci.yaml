name: netdevops-ci

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create .env from secrets
        run: |
          set -euo pipefail
          {
            echo "PYATS_USERNAME=${{ secrets.PYATS_USERNAME }}"
            echo "PYATS_PASSWORD=${{ secrets.PYATS_PASSWORD }}"
            if [ -n "${{ secrets.PYATS_ENABLE_PASSWORD }}" ]; then
              echo "PYATS_ENABLE_PASSWORD=${{ secrets.PYATS_ENABLE_PASSWORD }}"
            fi
          } > .env
          cat .env | cut -d= -f1

      - name: Docker & Compose versions
        run: |
          docker version
          docker compose version

      - name: Build image
        run: docker compose build

      - name: Render testbed
        run: docker compose run --rm pyats python tools/render_testbed.py

      - name: Run tests
        run: docker compose run --rm pyats pytest -vv --maxfail=1 --durations=10 --junitxml=pytest-report.xml

      - name: Upload pytest report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report
          path: pytest-report.xml

