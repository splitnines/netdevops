name: netdevops-ci

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  # Always-safe checks that require no secrets or device access
  smoke:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Python/pytest available?
        run: |
          python --version
          pip --version
      - name: Repo tree
        run: |
          pwd
          ls -la
      # Add any static checks here (flake8, yamllint, unit tests that don't hit devices)

  # Only run lab device tests when secrets are available
  lab-validate:
    runs-on: self-hosted
    needs: smoke
    if: ${{ secrets.PYATS_USERNAME != '' && secrets.PYATS_PASSWORD != '' && github.event_name == 'push' }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Write .env from GitHub Secrets
        run: |
          set -euo pipefail
          echo "PYATS_USERNAME=${{ secrets.PYATS_USERNAME }}" > .env
          echo "PYATS_PASSWORD=${{ secrets.PYATS_PASSWORD }}" >> .env
          if [ -n "${{ secrets.PYATS_ENABLE_PASSWORD }}" ]; then
            echo "PYATS_ENABLE_PASSWORD=${{ secrets.PYATS_ENABLE_PASSWORD }}" >> .env
          fi
          # show keys present (values redacted)
          cut -d= -f1 .env

      - name: Docker & Compose versions
        run: |
          docker version
          docker compose version

      - name: Build image
        run: docker compose build

      - name: Render testbed
        run: docker compose run --rm pyats python tools/render_testbed.py

      - name: Run tests (verbose) and keep report
        run: docker compose run --rm pyats pytest -vv --maxfail=1 --durations=10 --junitxml=pytest-report.xml

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pyats-artifacts
          path: |
            testbed/testbed.yaml
            pytest-report.xml

